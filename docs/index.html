<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=portfolio-operations-dashboard/">
<title>Opening ATLAS RISE Ops Dashboard</title>
<script>
  window.location.replace("portfolio-operations-dashboard/");
</script>
<style>
  :root {
    --ink: #023046;
    --sky: #549db8;
    --paper: #ffffff;
    --mist: #eef5f8;
    --line: #d6e2e8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at top left, rgba(84,157,184,0.18), transparent 32%),
      linear-gradient(180deg, #f8fbfc 0%, var(--mist) 100%);
  }
  main {
    width: min(520px, 100%);
    padding: 28px;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: var(--paper);
    box-shadow: 0 18px 48px rgba(2,48,70,0.08);
  }
  h1 {
    margin: 0 0 8px;
    font-size: 1.35rem;
    line-height: 1.2;
  }
  p {
    margin: 0 0 18px;
    color: #375767;
    line-height: 1.5;
  }
  a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 42px;
    padding: 0 16px;
    border-radius: 12px;
    background: var(--ink);
    color: #fff;
    font-weight: 700;
    text-decoration: none;
  }
</style>
</head>
<body>
<main>
  <h1>Opening ATLAS RISE Ops Dashboard</h1>
  <p>If you are not redirected automatically, open the dashboard below.</p>
  <a href="portfolio-operations-dashboard/">Open ATLAS</a>
</main>
</body>
</html>
