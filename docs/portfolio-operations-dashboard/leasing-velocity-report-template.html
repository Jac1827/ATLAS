<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Leasing Velocity Report (LVR)</title>
<!--
  ============================================================================
  LEASING VELOCITY REPORT (LVR) — ATLAS TEMPLATE
  ============================================================================
  Standalone, dependency-free. Drop into the ATLAS reporting section.

  HOW ATLAS FILLS IT
  ------------------
  1. Build a data object matching the LVR_DATA shape below (one block per
     variation). Inject it before render in any of these ways:
        window.LVR_DATA = { stabilized: {...}, leaseup: {...} };   // override all
     ...or replace the LVR_DATA literal in this file server-side.

  2. Pick the variation with the ATLAS filter — any of:
        window.LVR_MODE = 'leaseup';            // set before script runs
        <page>?mode=leaseup                     // query string
        the on-screen "Variation" dropdown      // demo / manual
     Accepted values: 'stabilized' | 'leaseup'.

  3. Optional theme accent:  window.LVR_THEME = 'institutional'|'editorial'|'dashboard'

  4. Images: put URLs on data.images { hero, feature, g1..g4 }. Empty = labeled
     placeholder. Swap these for your ATLAS asset picker / <img> upload control.

  EVERYTHING below the "DATA" block is presentation — safe to restyle. The
  DATA shape is the contract ATLAS populates. All values are display strings
  (already formatted) except `status` (drives the variance color) and the
  numeric-ish fields you may compute. Status vocabulary: ahead | watch | behind | ok.
  Funnel/severity/priority colors are derived; you only supply `status`/`severity`/`priority`.
  ============================================================================
-->
<style>
  :root{
    --accent:#0f6e70; --accent-soft:#e3f0f0;
    --ink:#1c2230; --ink-2:#3c4654; --ink-3:#5b6471; --mut:#8a93a3; --mut-2:#9aa1ad;
    --line:#e4e7ec; --line-2:#eef0f3; --hair:#cfd4dc;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'IBM Plex Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);background:#e9ebef;-webkit-font-smoothing:antialiased;}
  h1,h2,h3,h4{text-wrap:balance;margin:0;}
  p,li{text-wrap:pretty;}
  table{border-collapse:collapse;}
  .mono{font-family:'IBM Plex Mono','SFMono-Regular',Consolas,monospace;}

  /* page shell */
  .doc{max-width:8.5in;margin:0 auto;background:#fff;padding:54px clamp(20px,5vw,0.75in) 96px;box-shadow:0 1px 24px rgba(20,26,38,.10);}
  .doc-frame{width:100%;}
  .hdr-space,.ftr-space{display:none;}

  /* toolbar (screen only) */
  .bar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:10px 18px;background:rgba(247,248,250,.92);backdrop-filter:blur(6px);border-bottom:1px solid #dfe2e8;}
  .bar .lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#6b7280;}
  .bar .ctl{display:flex;align-items:center;gap:10px;}
  .bar select{font:inherit;font-size:12px;padding:6px 8px;border:1px solid #cfd4dc;border-radius:7px;background:#fff;color:var(--ink);}
  .bar button{font:inherit;font-size:12px;font-weight:600;color:#fff;background:var(--accent);border:none;border-radius:7px;padding:8px 14px;cursor:pointer;}

  /* primitives */
  .kicker{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:500;}
  .sec{margin-top:42px;}
  .sec-head{display:flex;align-items:baseline;gap:14px;border-bottom:2px solid var(--accent);padding-bottom:9px;margin-bottom:18px;}
  .sec-num{font-size:13px;font-weight:500;color:var(--accent);}
  .sec-title{font-size:20px;font-weight:600;letter-spacing:-.01em;color:var(--ink);}
  .sec-meta{margin-left:auto;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut-2);}
  .chip{font-size:11px;letter-spacing:.04em;padding:4px 10px;border:1px solid #d9dee6;border-radius:999px;color:var(--ink-3);}
  .tile{border:1px solid var(--line);border-radius:10px;padding:15px 15px 13px;background:#fff;}
  .tile.soft{background:var(--accent-soft);padding:14px 16px;}
  .tile-lbl{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--mut);}
  .tile-val{font-size:29px;font-weight:600;letter-spacing:-.02em;color:var(--ink);margin-top:7px;}
  .tile-val.acc{font-size:27px;color:var(--accent);margin-top:5px;}
  .tile-foot{display:flex;align-items:center;gap:8px;margin-top:11px;}
  .pill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .card{border:1px solid var(--line);border-radius:12px;background:#fff;}
  .nb{display:flex;gap:10px;margin-top:14px;padding:13px 16px;border-left:3px solid var(--accent);background:var(--accent-soft);border-radius:0 8px 8px 0;}
  .nb .tag{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);flex:none;padding-top:1px;}
  .nb p{margin:0;font-size:13px;line-height:1.55;color:var(--ink-2);}
  .num{font-variant-numeric:tabular-nums;}

  th{text-align:left;padding:8px 10px;font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);}
  thead tr{border-bottom:1.5px solid var(--hair);}
  td{padding:11px 10px;}
  tbody tr{border-bottom:1px solid var(--line-2);}

  /* image slots */
  .slot{width:100%;display:block;border-radius:12px;overflow:hidden;background:repeating-linear-gradient(135deg,#f1f3f6 0 14px,#eaedf1 14px 28px);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;}
  .slot .ph{font-size:11px;letter-spacing:.04em;color:#9aa1ad;text-align:center;padding:0 12px;}
  .slot img{width:100%;height:100%;object-fit:cover;display:block;}

  @page{size:letter;margin:0;}
  @media print{
    html{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    html,body{margin:0;padding:0;background:#fff;}
    .bar{display:none !important;}
    .doc{max-width:none !important;margin:0 !important;padding:0 .7in !important;box-shadow:none !important;}
    .hdr-space,.ftr-space{display:table-cell !important;height:.6in;}
    .pb{break-before:page;}
    .tile,.card,tr,figure,.nb{break-inside:avoid;}
    h2,h3{break-after:avoid;}
    p,li{orphans:3;widows:3;}
  }
</style>
</head>
<body>

<div class="bar">
  <span class="lbl" id="bar-label">ATLAS · Leasing Velocity Report</span>
  <div class="ctl">
    <label class="lbl" for="mode-select">Variation</label>
    <select id="mode-select">
      <option value="stabilized">Stabilized</option>
      <option value="leaseup">Lease-up</option>
    </select>
    <button id="print-btn" type="button">Print / Save PDF</button>
  </div>
</div>

<main class="doc">
  <table class="doc-frame" role="presentation">
    <thead><tr><td class="hdr-space"></td></tr></thead>
    <tbody><tr><td style="padding:0">
      <div id="lvr-root"><!-- rendered by JS --></div>
    </td></tr></tbody>
    <tfoot><tr><td class="ftr-space"></td></tr></tfoot>
  </table>
</main>

/* ============================================================================
   THEME + STATUS TOKENS  (derived — ATLAS does not supply colors)
   ============================================================================ */

  institutional:{accent:'#233044', soft:'#eef1f5'},
  editorial:    {accent:'#6b3d2e', soft:'#f4ede6'},
  dashboard:    {accent:'#0f6e70', soft:'#e3f0f0'}
};
const STATUS = {
  ahead: {color:'#1f7a4d', bg:'#e7f3ec', dot:'#2e9e63'},
  watch: {color:'#946200', bg:'#fbf1d9', dot:'#c79212'},
  behind:{color:'#a3372b', bg:'#f7e4e0', dot:'#c0533f'},

/* ============================================================================
   RENDER
   ============================================================================ */
const E = s => String(s == null ? '' : s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const st = k => STATUS[k] || STATUS.ok;

function imgSlot(url, ph, height){
  const h = `height:${height}px`;
  if (url) return `<div class="slot" style="${h}"><img src="${E(url)}" alt="${E(ph)}"></div>`;
  return `<div class="slot" style="${h}"><span class="ph mono">${E(ph)}</span></div>`;
}

function secHead(num, title, meta){
  return `<div class="sec-head"><span class="sec-num mono">${num}</span>`
    + `<h2 class="sec-title">${E(title)}</h2>`
    + `<span class="sec-meta mono">${E(meta)}</span></div>`;
}

function renderReport(d){
  const m = d.meta, img = d.images || {};

  const kpis = d.kpis.map(k=>{const c=st(k.status);return `
    <div class="tile">
      <div class="tile-lbl mono">${E(k.label)}</div>
      <div class="tile-val">${E(k.value)}</div>
      <div class="tile-foot"><span style="font-size:11px;color:var(--ink-3)">${E(k.target)}</span>
      <span class="pill" style="margin-left:auto;color:${c.color};background:${c.bg}">${E(k.note)}</span></div>
    </div>`;}).join('');

  const funnel = d.funnel.map(s=>{
    let row = `<div style="display:flex;align-items:center;gap:16px;padding:14px 0 10px">
      <div style="width:140px;flex:none"><div style="font-size:14px;font-weight:600;color:var(--ink)">${E(s.name)}</div>
      <div style="font-size:11px;color:var(--mut-2);margin-top:1px">${E(s.sub)}</div></div>
      <div style="flex:1;min-width:0"><div style="position:relative;height:28px;border-radius:6px;background:#f0f2f5;overflow:hidden">
      <div style="height:100%;width:${E(s.barPct)};min-width:40px;background:var(--accent);border-radius:6px"></div></div></div>
      <div style="width:58px;text-align:right;font-size:22px;font-weight:600;letter-spacing:-.02em;color:var(--ink)">${E(s.count)}</div></div>`;
    if (s.conv){const c=st(s.convStatus);row += `<div style="display:flex;align-items:center;gap:10px;padding:0 0 4px 156px;flex-wrap:wrap">
      <span class="mono" style="font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);min-width:96px">${E(s.convLabel)}</span>
      <span style="font-size:15px;font-weight:600;color:${c.color}">${E(s.conv)}</span>
      <span style="font-size:11px;color:var(--mut-2)">${E(s.benchmark)}</span>
      <span class="pill" style="color:${c.color};background:${c.bg}">${E(s.convNote)}</span></div>`;}
    return row;
  }).join('');

  const sources = d.sources.map(r=>{const c=st(r.status);return `
    <tr><td style="padding-left:0;font-weight:600;color:var(--ink)">${E(r.source)}</td>
    <td class="num" style="text-align:right;color:var(--ink-2)">${E(r.leads)}</td>
    <td class="num" style="text-align:right;font-weight:600;color:${c.color}">${E(r.tourRate)}</td>
    <td class="num" style="text-align:right;color:var(--ink-2)">${E(r.leases)}</td>
    <td class="num" style="text-align:right;color:var(--ink-2)">${E(r.cpl)}</td>
    <td style="padding-left:14px"><span style="display:inline-flex;align-items:center;gap:7px">
    <span style="width:7px;height:7px;border-radius:50%;background:${c.dot};flex:none"></span>
    <span style="font-size:12px;color:var(--ink-3)">${E(r.note)}</span></span></td></tr>`;}).join('');

  const occTiles = d.occTiles.map(t=>{const c=st(t.status);return `
    <div class="tile"><div class="tile-lbl mono">${E(t.label)}</div>
    <div class="tile-val" style="font-size:27px;margin-top:7px">${E(t.value)}</div>
    <div class="tile-foot" style="margin-top:10px"><span style="font-size:11px;color:var(--ink-3)">${E(t.target)}</span>
    <span class="pill" style="margin-left:auto;color:${c.color};background:${c.bg}">${E(t.note)}</span></div></div>`;}).join('');

  const occSegs = d.occBar.map(s=>`<div style="width:${E(s.pct)};background:${E(s.color)}"></div>`).join('');
  const occLegend = d.occBar.map(s=>`<span style="display:inline-flex;align-items:center;gap:8px">
    <span style="width:11px;height:11px;border-radius:3px;background:${E(s.color)};flex:none"></span>
    <span style="font-size:13px;color:var(--ink)"><strong style="font-weight:600">${E(s.count)}</strong> &nbsp;${E(s.label)} &nbsp;<span style="color:var(--mut-2)">${E(s.pct)}</span></span></span>`).join('');

  const comps = d.comps.map(c=>{
    const sub = c.isSubject;
    return `<tr style="background:${sub?'var(--accent-soft)':'#fff'};border-left:3px solid ${sub?'var(--accent)':'transparent'}">
      <td style="padding-left:12px;font-weight:${sub?700:500};color:${sub?'var(--accent)':'var(--ink)'}">${E(c.property)}${sub?'<span class="mono" style="font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--accent)">  · Subject</span>':''}</td>
      <td style="color:var(--ink-3)">${E(c.type)}</td>
      <td class="num" style="text-align:right;color:var(--ink-2)">${E(c.marketRent)}</td>
      <td style="color:var(--ink-2)">${E(c.concession)}</td>
      <td class="num" style="text-align:right;padding-right:12px;font-weight:600;color:var(--ink)">${E(c.effectiveRent)}</td></tr>`;
  }).join('');

  const diag = d.diag.map(g=>{const c=st(g.status);return `
    <div class="card" style="display:flex;gap:14px;align-items:flex-start;padding:14px 16px">
    <span class="mono" style="font-size:10px;font-weight:600;letter-spacing:.06em;padding:3px 9px;border-radius:6px;color:${c.color};background:${c.bg};flex:none;min-width:46px;text-align:center">${E(g.severity)}</span>
    <div style="min-width:0"><div style="font-size:14px;font-weight:600;color:var(--ink);margin-bottom:3px">${E(g.area)}</div>
    <p style="margin:0;font-size:13px;line-height:1.55;color:#4a5462">${E(g.finding)}</p></div></div>`;}).join('');

  const recs = d.recs.map(r=>{const p=PRIORITY[r.priority]||PRIORITY.P3;return `
    <tr><td style="padding-left:0;vertical-align:top"><span class="mono pill" style="font-size:11px;color:${p.color};background:${p.bg}">${E(r.priority)}</span></td>
    <td style="color:#2b3340;line-height:1.5">${E(r.action)}</td>
    <td style="color:var(--ink-3);vertical-align:top">${E(r.owner)}</td>
    <td class="num" style="padding-right:0;color:var(--ink-3);vertical-align:top">${E(r.due)}</td></tr>`;}).join('');

  const thStyle = '';
  return `
  <header style="margin-bottom:6px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:24px">
      <div style="min-width:0">
        <div class="kicker mono">Marketing &amp; Leasing Velocity Report</div>
        <h1 style="font-family:'Source Serif 4',Georgia,serif;font-size:39px;line-height:1.04;font-weight:600;letter-spacing:-.012em;margin:11px 0 7px;color:#141821">${E(m.community)}</h1>
        <div style="font-size:14px;color:var(--ink-3)">${E(m.address)}</div>
        <div style="display:flex;gap:8px;margin-top:13px;flex-wrap:wrap">
          <span class="chip mono">${E(m.units)}</span><span class="chip mono">${E(m.type)}</span></div>
      </div>
      <div style="text-align:right;flex:none">
        <div style="font-size:13px;font-weight:600;color:var(--ink)">${E(m.period)}</div>
        <div style="font-size:12px;color:var(--mut);margin-top:2px">${E(m.trailing)}</div>
        <div class="mono" style="margin-top:14px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut-2)">Prepared by</div>
        <div style="font-size:13px;font-weight:600;color:var(--ink);margin-top:2px">${E(m.prepared)}</div>
      </div>
    </div>
    <figure style="margin:18px 0 0">${imgSlot(img.hero, 'Drop community hero — exterior / signage / aerial', 288)}</figure>
    <div class="grid-3" style="margin-top:14px">
      <div class="tile soft"><div class="tile-lbl mono">${E(m.leasedLabel)}</div><div class="tile-val acc">${E(m.leasedValue)}</div></div>
      <div class="tile soft"><div class="tile-lbl mono">${E(m.occupiedLabel)}</div><div class="tile-val acc">${E(m.occupiedValue)}</div></div>
      <div class="tile soft"><div class="tile-lbl mono">${E(m.netLabel)}</div><div class="tile-val acc">${E(m.netValue)}</div></div>
    </div>
  </header>

  <section class="sec">${secHead('01','Executive Summary', m.period)}
    <p style="font-size:15px;line-height:1.62;color:#333c49;margin:0 0 20px">${E(d.summary)}</p>
    <div class="grid-4">${kpis}</div>
  </section>

  <section class="sec">${secHead('02','Leasing Funnel & Closing Ratios','Weekly · conversion vs benchmark')}
    <div class="card" style="padding:8px 20px 16px">${funnel}</div>
    <div class="nb"><span class="tag mono">Read</span><p>${d.funnelNote}</p></div>
  </section>

  <section class="sec">${secHead('03','Traffic by Source','Trailing 30 day')}
    <table style="width:100%;font-size:13px"><thead><tr>
      <th style="padding-left:0">Source</th><th style="text-align:right">Leads</th><th style="text-align:right">Tour&nbsp;rate</th>
      <th style="text-align:right">Leases</th><th style="text-align:right">Cost / lead</th><th style="padding-left:14px">Read</th>
    </tr></thead><tbody>${sources}</tbody></table>
    <div class="nb"><span class="tag mono">Read</span><p>${E(d.sourcesNote)}</p></div>
  </section>

  <section class="sec">${secHead('04','Occupancy & Exposure', m.units)}
    <div class="grid-4" style="margin-bottom:20px">${occTiles}</div>
    <div class="card" style="padding:18px 20px">
      <div class="mono" style="font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);margin-bottom:12px">Unit status — physical breakdown</div>
      <div style="display:flex;height:38px;border-radius:8px;overflow:hidden;border:1px solid var(--line)">${occSegs}</div>
      <div style="display:flex;flex-wrap:wrap;gap:18px;margin-top:14px">${occLegend}</div>
    </div>
  </section>

  <section class="sec pb">${secHead('05','Pricing & Concessions vs Comps','Subject vs market')}
    <table style="width:100%;font-size:13px"><thead><tr>
      <th style="padding-left:12px">Property</th><th>Floorplan</th><th style="text-align:right">Market rent</th>
      <th>Concession</th><th style="text-align:right;padding-right:12px">Effective rent</th>
    </tr></thead><tbody>${comps}</tbody></table>
    <div class="nb"><span class="tag mono">Concession control</span><p>${E(d.concessionNote)}</p></div>
  </section>

  <section class="sec">${secHead('06','Diagnosis — Where Leasing Is Leaking','Ranked by severity')}
    <div style="display:flex;flex-direction:column;gap:10px">${diag}</div>
  </section>

  <section class="sec pb">${secHead('07','Recommendations & Action Plan','Owner · timeframe')}
    <table style="width:100%;font-size:13px"><thead><tr>
      <th style="padding-left:0;width:54px">Pri</th><th>Action</th><th style="width:130px">Owner</th><th style="padding-right:0;width:110px">By</th>
    </tr></thead><tbody>${recs}</tbody></table>
  </section>

  <section class="sec pb">${secHead('08','The Community','Images')}
    <figure style="margin:0 0 12px">${imgSlot(img.feature, 'Signature shot — clubhouse / amenity / leasing office', 240)}</figure>
    <div class="grid-4">
      ${imgSlot(img.g1,'Exterior',150)}${imgSlot(img.g2,'Model unit',150)}
      ${imgSlot(img.g3,'Amenity / pool',150)}${imgSlot(img.g4,'Fitness / co-work',150)}
    </div>
    <p class="mono" style="margin:16px 0 0;font-size:11px;line-height:1.5;color:var(--mut-2)">Report generated by ATLAS · ${E(m.community)} · ${E(m.period)} · Confidential — for internal asset-management use.</p>
  </section>`;
}

/* ============================================================================
   BOOT  —  resolve data, theme, mode; wire filter + print
   ============================================================================ */
function resolveMode(){
  let v = (window.LVR_MODE || new URLSearchParams(location.search).get('mode') || 'stabilized');
  v = String(v).toLowerCase().replace(/[^a-z]/g,'');           // 'lease-up' -> 'leaseup'
  return (v === 'leaseup' || v === 'leasup') ? 'leaseup' : 'stabilized';
}
function readAtlasPayload(){
  const params = new URLSearchParams(location.search);
  const key = params.get('atlasStorageKey') || 'atlas_lvr_data_v1';
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const payload = JSON.parse(raw);
    return payload && typeof payload === 'object' ? payload : null;
  } catch (error) {
    console.warn('ATLAS LVR payload could not be read.', error);
    return null;
  }
}
function applyTheme(name){
  const t = THEMES[String(name||'').toLowerCase()] || THEMES.dashboard;
  document.documentElement.style.setProperty('--accent', t.accent);
  document.documentElement.style.setProperty('--accent-soft', t.soft);
}
function render(){
  const atlasPayload = readAtlasPayload();
  const DATA = window.LVR_DATA || atlasPayload?.data || atlasPayload || LVR_DATA_DEFAULT;
  const mode = resolveMode();
  const d = DATA[mode] || DATA.stabilized;
  applyTheme(window.LVR_THEME || new URLSearchParams(location.search).get('theme') || atlasPayload?.theme || 'dashboard');
  document.getElementById('lvr-root').innerHTML = renderReport(d);
  document.getElementById('bar-label').textContent = 'ATLAS · Leasing Velocity Report — ' + (d.meta.label || mode);
  const sel = document.getElementById('mode-select'); if (sel) sel.value = mode;
}
document.getElementById('mode-select').addEventListener('change', e=>{
  window.LVR_MODE = e.target.value;
  const u = new URL(location); u.searchParams.set('mode', e.target.value); history.replaceState(null,'',u);
  render();
});
document.getElementById('print-btn').addEventListener('click', ()=>window.print());
render();
if (new URLSearchParams(location.search).get('print') === '1') {
  setTimeout(()=>window.print(), 250);
}
</script>
</body>
